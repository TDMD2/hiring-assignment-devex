name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  insights-service:
    name: Test and build Insights service
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}/deployment-insights

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Python dependencies
        working-directory: deployment-insights
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: deployment-insights
        run: pytest -m "not integration"

      - name: Build Insights Docker image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} ./deployment-insights

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Insights Docker image
        if: github.event_name == 'push'
        run: docker push $IMAGE_NAME:${{ github.sha }}